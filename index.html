<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Messenger</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .app {
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #121212;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .hidden {
            display: none;
        }
        .login-container {
            padding: 40px 20px;
            text-align: center;
        }
        .login-container h1 {
            margin-bottom: 30px;
            color: #2ecc71;
        }
        .login-container input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #2a2a2a;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        .login-container button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: #2ecc71;
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .header {
            padding: 15px;
            background: #1a1a1a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #2ecc71;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }
        .exit-btn, .edit-btn {
            background: #e74c3c;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }
        .edit-btn {
            background: #3498db;
            margin-right: 8px;
        }
        .tabs {
            display: flex;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            color: #888;
        }
        .tab.active {
            color: #2ecc71;
            border-bottom: 2px solid #2ecc71;
        }
        .search-box {
            padding: 12px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
        }
        .search-box input {
            width: 100%;
            padding: 10px 15px;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: white;
            font-size: 14px;
        }
        .users-list, .chats-list {
            flex: 1;
            overflow-y: auto;
        }
        .user-item, .chat-item {
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border-bottom: 1px solid #2a2a2a;
        }
        .user-item:hover, .chat-item:hover {
            background: #2a2a2a;
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #121212;
        }
        .chat-header {
            padding: 15px;
            background: #1a1a1a;
            border-bottom: 1px solid #333;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        .message.sent {
            background: #2ecc71;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #121212;
        }
        .message.received {
            background: #2a2a2a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message-input {
            display: flex;
            gap: 10px;
            padding: 15px;
            background: #1a1a1a;
            border-top: 1px solid #333;
        }
        .message-input input {
            flex: 1;
            padding: 12px;
            background: #2a2a2a;
            border: none;
            border-radius: 25px;
            color: white;
            outline: none;
        }
        .message-input button {
            background: #2ecc71;
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            color: #121212;
            font-weight: bold;
            cursor: pointer;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-content {
            background: #1e1e1e;
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 350px;
        }
        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 10px;
            color: white;
        }
        .modal-content button {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            background: #2ecc71;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }
        .create-btn {
            background: #2ecc71;
            margin: 12px;
            padding: 12px;
            text-align: center;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="app" id="app">
    <!-- Login Screen -->
    <div id="loginScreen" class="screen">
        <div class="login-container">
            <h1>Messenger</h1>
            <input type="text" id="loginPhone" placeholder="Phone number (+79123456789)">
            <input type="text" id="loginName" placeholder="Your name">
            <button id="loginBtn">Start</button>
            <p style="margin-top: 20px; font-size: 12px; color: #666;">Admin: +888888</p>
        </div>
    </div>

    <!-- Main Screen -->
    <div id="mainScreen" class="screen hidden">
        <div class="header">
            <div class="user-info">
                <div id="headerAvatar" class="avatar"></div>
                <span id="userName">Loading...</span>
            </div>
            <div>
                <button id="editProfileBtn" class="edit-btn">Edit</button>
                <button id="exitBtn" class="exit-btn">Exit</button>
            </div>
        </div>
        
        <div class="tabs">
            <div class="tab active" data-tab="chats">Chats</div>
            <div class="tab" data-tab="contacts">Contacts</div>
            <div class="tab" data-tab="channels">Channels</div>
        </div>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search by phone or name...">
        </div>
        
        <div id="chatsPanel" class="chats-list">
            <div style="padding: 20px; text-align: center; color: #666;">Loading...</div>
        </div>
        
        <div id="contactsPanel" class="users-list hidden">
            <div class="create-btn" id="addContactBtn">+ Add contact</div>
            <div style="padding: 20px; text-align: center; color: #666;">Loading...</div>
        </div>
        
        <div id="channelsPanel" class="users-list hidden">
            <div class="create-btn" id="createChannelBtn">+ Create channel</div>
            <div style="padding: 20px; text-align: center; color: #666;">Loading...</div>
        </div>
    </div>

    <!-- Chat Screen -->
    <div id="chatScreen" class="screen hidden">
        <div class="chat-header">
            <button id="chatBackBtn" class="back-btn">←</button>
            <div id="chatAvatar" class="avatar"></div>
            <div>
                <div id="chatName" style="font-weight: bold;"></div>
            </div>
        </div>
        <div id="chatMessages" class="messages">
            <div style="text-align: center; padding: 20px; color: #666;">No messages</div>
        </div>
        <div class="message-input">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button id="sendBtn">Send</button>
        </div>
    </div>
</div>

<!-- Modals -->
<div id="editModal" class="modal hidden">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <input type="text" id="editName" placeholder="Name">
        <input type="text" id="editPhone" placeholder="Phone">
        <textarea id="editBio" placeholder="Bio" rows="2"></textarea>
        <input type="text" id="editAvatar" placeholder="Avatar URL">
        <button id="saveProfileBtn">Save</button>
        <button id="closeEditBtn" style="background:#e74c3c;">Cancel</button>
    </div>
</div>

<div id="addContactModal" class="modal hidden">
    <div class="modal-content">
        <h3>Add Contact</h3>
        <input type="text" id="contactPhone" placeholder="Phone number">
        <div id="searchResult" style="margin: 10px 0;"></div>
        <button id="addContactConfirmBtn">Add</button>
        <button id="closeContactBtn" style="background:#e74c3c;">Cancel</button>
    </div>
</div>

<div id="channelModal" class="modal hidden">
    <div class="modal-content">
        <h3>Create Channel</h3>
        <input type="text" id="channelName" placeholder="Channel name">
        <input type="text" id="channelDesc" placeholder="Description">
        <input type="text" id="channelAvatar" placeholder="Avatar URL">
        <button id="createChannelBtnConfirm">Create</button>
        <button id="closeChannelBtn" style="background:#e74c3c;">Cancel</button>
    </div>
</div>

<script>
    // ============ CONFIG ============
    // ⚠️⚠️⚠️ ЗАМЕНИ ЭТОТ ID НА СВОЙ ИЗ APPWRITE ⚠️⚠️⚠️
    const APPWRITE_PROJECT_ID = "69e52afe0037f01494b7";  // <--- ВСТАВЬ СВОЙ ID СЮДА
    const APPWRITE_ENDPOINT = "https://cloud.appwrite.io/v1";
    
    let currentUser = null;
    let currentChat = null;
    let allUsers = [];
    let allChats = [];
    let messagesInterval = null;
    
    // API functions
    async function appwriteRequest(endpoint, method = 'GET', body = null) {
        const url = `${APPWRITE_ENDPOINT}${endpoint}`;
        const headers = {
            'X-Appwrite-Project': APPWRITE_PROJECT_ID,
            'Content-Type': 'application/json'
        };
        
        const options = { method, headers };
        if (body) options.body = JSON.stringify(body);
        
        try {
            const response = await fetch(url, options);
            return await response.json();
        } catch (e) {
            console.error('API error:', e);
            return null;
        }
    }
    
    async function login(phone, name) {
        try {
            // Search for existing user
            const searchResult = await appwriteRequest(`/database/collections/users/documents?queries[0]=equal("phone","${phone}")`);
            
            let userId;
            if (searchResult && searchResult.documents && searchResult.documents.length > 0) {
                userId = searchResult.documents[0].$id;
                await appwriteRequest(`/database/collections/users/documents/${userId}`, 'PATCH', {
                    data: { name: name, lastSeen: new Date().toISOString() }
                });
            } else {
                // Create new user
                const newUser = await appwriteRequest('/database/collections/users/documents', 'POST', {
                    documentId: 'unique()',
                    data: {
                        phone: phone,
                        name: name,
                        bio: '',
                        avatar: '',
                        isAdmin: phone === '+888888',
                        createdAt: new Date().toISOString(),
                        lastSeen: new Date().toISOString()
                    }
                });
                userId = newUser.$id;
            }
            
            currentUser = {
                id: userId,
                phone: phone,
                name: name,
                isAdmin: phone === '+888888'
            };
            
            localStorage.setItem('messenger_user', JSON.stringify(currentUser));
            return true;
        } catch (e) {
            console.error('Login error:', e);
            alert('Login error: ' + e.message);
            return false;
        }
    }
    
    async function logout() {
        localStorage.removeItem('messenger_user');
        currentUser = null;
        if (messagesInterval) clearInterval(messagesInterval);
        location.reload();
    }
    
    async function loadUsers() {
        const result = await appwriteRequest('/database/collections/users/documents');
        if (result && result.documents) {
            allUsers = result.documents;
        }
        return allUsers;
    }
    
    async function loadChats() {
        const result = await appwriteRequest('/database/collections/chats/documents');
        if (result && result.documents) {
            allChats = result.documents;
        }
        return allChats;
    }
    
    async function loadMessages(chatId) {
        const result = await appwriteRequest(`/database/collections/messages/documents?queries[0]=equal("chatId","${chatId}")`);
        if (result && result.documents) {
            return result.documents.sort((a,b) => (a.data?.timestamp || '') > (b.data?.timestamp || '') ? 1 : -1);
        }
        return [];
    }
    
    async function sendMessage(chatId, text) {
        await appwriteRequest('/database/collections/messages/documents', 'POST', {
            documentId: 'unique()',
            data: {
                chatId: chatId,
                senderId: currentUser.id,
                senderPhone: currentUser.phone,
                text: text,
                timestamp: new Date().toISOString()
            }
        });
    }
    
    async function createChat(otherPhone, type = 'private', name = '') {
        const chatId = [currentUser.phone, otherPhone].sort().join('_');
        const existing = await appwriteRequest(`/database/collections/chats/documents/${chatId}`);
        
        if (!existing || !existing.$id) {
            await appwriteRequest('/database/collections/chats/documents', 'POST', {
                documentId: chatId,
                data: {
                    participants: [currentUser.phone, otherPhone],
                    type: type,
                    name: name,
                    createdAt: new Date().toISOString()
                }
            });
        }
        return chatId;
    }
    
    async function createChannel(name, description, avatar) {
        const channelId = 'channel_' + Date.now();
        await appwriteRequest('/database/collections/chats/documents', 'POST', {
            documentId: channelId,
            data: {
                participants: [currentUser.phone],
                type: 'channel',
                name: name,
                description: description,
                avatar: avatar,
                owner: currentUser.phone,
                createdAt: new Date().toISOString()
            }
        });
        return channelId;
    }
    
    async function updateProfile(name, phone, bio, avatar) {
        await appwriteRequest(`/database/collections/users/documents/${currentUser.id}`, 'PATCH', {
            data: { name: name, phone: phone, bio: bio, avatar: avatar }
        });
        currentUser.name = name;
        currentUser.phone = phone;
        localStorage.setItem('messenger_user', JSON.stringify(currentUser));
    }
    
    async function addContact(phone) {
        const user = await appwriteRequest(`/database/collections/users/documents?queries[0]=equal("phone","${phone}")`);
        if (user && user.documents && user.documents.length > 0) {
            await createChat(phone);
            return true;
        }
        return false;
    }
    
    // ============ UI ============
    function render() {
        if (!currentUser) return;
        document.getElementById('userName').innerText = currentUser.name;
        const avatarDiv = document.getElementById('headerAvatar');
        avatarDiv.innerText = currentUser.name.charAt(0).toUpperCase();
        
        loadAllData();
    }
    
    async function loadAllData() {
        await loadUsers();
        await loadChats();
        renderChats();
        renderContacts();
        renderChannels();
    }
    
    function renderChats() {
        const container = document.getElementById('chatsPanel');
        const myChats = allChats.filter(c => c.data?.type === 'private' && c.data?.participants?.includes(currentUser.phone));
        
        if (myChats.length === 0) {
            container.innerHTML = '<div style="padding: 20px; text-align: center; color: #666;">No chats yet</div>';
            return;
        }
        
        container.innerHTML = '';
        for (const chat of myChats) {
            const otherPhone = chat.data.participants.find(p => p !== currentUser.phone);
            const otherUser = allUsers.find(u => u.data?.phone === otherPhone);
            const otherName = otherUser?.data?.name || otherPhone;
            
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="avatar">${otherName.charAt(0).toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:bold">${otherName}</div>
                    <div style="font-size:12px;color:#888">${otherPhone}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.$id, otherName, otherPhone);
            container.appendChild(div);
        }
    }
    
    function renderContacts() {
        const container = document.getElementById('contactsPanel');
        const otherUsers = allUsers.filter(u => u.data?.phone !== currentUser.phone);
        
        if (otherUsers.length === 0) {
            container.innerHTML = '<div class="create-btn" id="addContactBtn">+ Add contact</div><div style="padding: 20px; text-align: center; color: #666;">No contacts</div>';
            document.getElementById('addContactBtn')?.addEventListener('click', showAddContactModal);
            return;
        }
        
        container.innerHTML = '<div class="create-btn" id="addContactBtn">+ Add contact</div>';
        for (const user of otherUsers) {
            const userData = user.data;
            const div = document.createElement('div');
            div.className = 'user-item';
            div.innerHTML = `
                <div class="avatar">${(userData?.name || '?').charAt(0).toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:bold">${userData?.name || 'Unknown'}</div>
                    <div style="font-size:12px;color:#888">${userData?.phone || ''}</div>
                </div>
                <button class="chat-start" data-phone="${userData?.phone}" style="background:#2ecc71;border:none;padding:6px 12px;border-radius:15px;color:white;cursor:pointer;">Chat</button>
            `;
            div.querySelector('.chat-start').onclick = (e) => {
                e.stopPropagation();
                startChat(userData.phone, userData.name);
            };
            container.appendChild(div);
        }
        document.getElementById('addContactBtn')?.addEventListener('click', showAddContactModal);
    }
    
    function renderChannels() {
        const container = document.getElementById('channelsPanel');
        const channels = allChats.filter(c => c.data?.type === 'channel');
        
        if (channels.length === 0) {
            container.innerHTML = '<div class="create-btn" id="createChannelBtn">+ Create channel</div><div style="padding: 20px; text-align: center; color: #666;">No channels</div>';
            document.getElementById('createChannelBtn')?.addEventListener('click', showCreateChannelModal);
            return;
        }
        
        container.innerHTML = '<div class="create-btn" id="createChannelBtn">+ Create channel</div>';
        for (const channel of channels) {
            const channelData = channel.data;
            const div = document.createElement('div');
            div.className = 'chat-item';
            div.innerHTML = `
                <div class="avatar">${(channelData?.name || 'C').charAt(0).toUpperCase()}</div>
                <div style="flex:1">
                    <div style="font-weight:bold">${channelData?.name || 'Channel'}</div>
                    <div style="font-size:12px;color:#888">${channelData?.description || 'Channel'}</div>
                </div>
            `;
            div.onclick = () => openChannel(channel.$id, channelData?.name || 'Channel');
            container.appendChild(div);
        }
        document.getElementById('createChannelBtn')?.addEventListener('click', showCreateChannelModal);
    }
    
    async function openChat(chatId, otherName, otherPhone) {
        currentChat = { id: chatId, type: 'private', name: otherName, phone: otherPhone };
        document.getElementById('chatName').innerText = otherName;
        document.getElementById('chatAvatar').innerText = otherName.charAt(0).toUpperCase();
        
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        
        await loadMessagesIntoChat(chatId);
        
        if (messagesInterval) clearInterval(messagesInterval);
        messagesInterval = setInterval(async () => {
            await loadMessagesIntoChat(chatId);
        }, 2000);
    }
    
    async function openChannel(channelId, channelName) {
        currentChat = { id: channelId, type: 'channel', name: channelName };
        document.getElementById('chatName').innerText = channelName;
        document.getElementById('chatAvatar').innerText = channelName.charAt(0).toUpperCase();
        
        document.getElementById('mainScreen').classList.add('hidden');
        document.getElementById('chatScreen').classList.remove('hidden');
        
        await loadMessagesIntoChat(channelId);
        
        if (messagesInterval) clearInterval(messagesInterval);
        messagesInterval = setInterval(async () => {
            await loadMessagesIntoChat(channelId);
        }, 2000);
    }
    
    async function loadMessagesIntoChat(chatId) {
        const messages = await loadMessages(chatId);
        const container = document.getElementById('chatMessages');
        
        if (messages.length === 0) {
            container.innerHTML = '<div style="text-align: center; padding: 20px; color: #666;">No messages yet</div>';
            return;
        }
        
        container.innerHTML = messages.map(msg => {
            const isSent = msg.data?.senderId === currentUser.id;
            return `<div class="message ${isSent ? 'sent' : 'received'}">${msg.data?.text || ''}</div>`;
        }).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    async function startChat(phone, name) {
        const chatId = await createChat(phone);
        await openChat(chatId, name, phone);
    }
    
    async function sendCurrentMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text || !currentChat) return;
        
        await sendMessage(currentChat.id, text);
        input.value = '';
        await loadMessagesIntoChat(currentChat.id);
    }
    
    function showAddContactModal() {
        document.getElementById('addContactModal').classList.remove('hidden');
    }
    
    function showCreateChannelModal() {
        document.getElementById('channelModal').classList.remove('hidden');
    }
    
    // ============ Event Listeners ============
    document.getElementById('loginBtn').onclick = async () => {
        const phone = document.getElementById('loginPhone').value.trim();
        const name = document.getElementById('loginName').value.trim();
        if (!phone || !name) {
            alert('Enter phone and name');
            return;
        }
        if (await login(phone, name)) {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainScreen').classList.remove('hidden');
            render();
        }
    };
    
    document.getElementById('exitBtn').onclick = () => logout();
    document.getElementById('chatBackBtn').onclick = () => {
        if (messagesInterval) clearInterval(messagesInterval);
        document.getElementById('chatScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        loadAllData();
    };
    document.getElementById('sendBtn').onclick = () => sendCurrentMessage();
    document.getElementById('messageInput').onkeypress = (e) => {
        if (e.key === 'Enter') sendCurrentMessage();
    };
    
    // Tabs
    document.querySelectorAll('.tab').forEach(tab => {
        tab.onclick = () => {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            const tabName = tab.dataset.tab;
            document.getElementById('chatsPanel').classList.add('hidden');
            document.getElementById('contactsPanel').classList.add('hidden');
            document.getElementById('channelsPanel').classList.add('hidden');
            document.getElementById(`${tabName}Panel`).classList.remove('hidden');
        };
    });
    
    // Edit profile
    document.getElementById('editProfileBtn').onclick = () => {
        document.getElementById('editName').value = currentUser.name;
        document.getElementById('editPhone').value = currentUser.phone;
        document.getElementById('editModal').classList.remove('hidden');
    };
    document.getElementById('saveProfileBtn').onclick = async () => {
        const name = document.getElementById('editName').value;
        const phone = document.getElementById('editPhone').value;
        const bio = document.getElementById('editBio').value;
        const avatar = document.getElementById('editAvatar').value;
        await updateProfile(name, phone, bio, avatar);
        document.getElementById('editModal').classList.add('hidden');
        render();
    };
    document.getElementById('closeEditBtn').onclick = () => {
        document.getElementById('editModal').classList.add('hidden');
    };
    
    // Add contact
    document.getElementById('addContactConfirmBtn').onclick = async () => {
        const phone = document.getElementById('contactPhone').value.trim();
        if (!phone) return;
        if (await addContact(phone)) {
            alert('Contact added!');
            document.getElementById('addContactModal').classList.add('hidden');
            loadAllData();
        } else {
            alert('User not found');
        }
    };
    document.getElementById('closeContactBtn').onclick = () => {
        document.getElementById('addContactModal').classList.add('hidden');
    };
    
    // Create channel
    document.getElementById('createChannelBtnConfirm').onclick = async () => {
        const name = document.getElementById('channelName').value.trim();
        const desc = document.getElementById('channelDesc').value.trim();
        const avatar = document.getElementById('channelAvatar').value.trim();
        if (!name) return;
        await createChannel(name, desc, avatar);
        document.getElementById('channelModal').classList.add('hidden');
        loadAllData();
    };
    document.getElementById('closeChannelBtn').onclick = () => {
        document.getElementById('channelModal').classList.add('hidden');
    };
    
    // Check for existing session
    const savedUser = localStorage.getItem('messenger_user');
    if (savedUser) {
        currentUser = JSON.parse(savedUser);
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('mainScreen').classList.remove('hidden');
        render();
    }
</script>
</body>
</html>
